services:
  postgres:
    image: postgres:16-alpine
    container_name: scheduler-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: scheduler
      POSTGRES_PASSWORD: scheduler
      POSTGRES_DB: scheduler
    ports:
      - "5455:5432"
    volumes:
      - scheduler-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scheduler -d scheduler"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  scheduler-pgdata:
